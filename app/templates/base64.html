{% extends "base.html" %}
{% block title %}Base64 编解码工具{% endblock %}
{% block content %}
<h2>Base64 编解码工具</h2>
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">🔒 编码</div>
            <div class="card-body">
                <form hx-post="/code/base64/encode" hx-target="#encodeResult" hx-swap="innerHTML" hx-on::after-request="addCopyButton('encodeResult')">
                    <textarea class="form-control" name="text" rows="4" placeholder="请输入文本..."></textarea>
                    <button type="submit" class="btn btn-primary mt-2">编码</button>
                </form>
                <div id="encodeResult" class="mt-3"></div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">🔓 解码</div>
            <div class="card-body">
                <form hx-post="/code/base64/decode" hx-target="#decodeResult" hx-swap="innerHTML" hx-on::after-request="addCopyButton('decodeResult')">
                    <textarea class="form-control" name="encoded" rows="4" placeholder="请输入 Base64..."></textarea>
                    <button type="submit" class="btn btn-primary mt-2">解码</button>
                </form>
                <div id="decodeResult" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>
<script>
function addCopyButton(containerId) {
    const container = document.getElementById(containerId);
    const contentDiv = container.querySelector('.alert-success, .alert-info');
    if (!contentDiv) return;
    if (container.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.textContent = '复制结果';
    btn.className = 'btn btn-sm btn-secondary mt-2 copy-btn';
    btn.onclick = () => {
        let text = contentDiv.innerText;
        // 去掉前面的"编码结果："或"解码结果："字样
        text = text.replace(/^[^:]+：/, '').trim();
        navigator.clipboard.writeText(text);
        btn.textContent = '已复制！';
        setTimeout(() => btn.textContent = '复制结果', 2000);
    };
    container.appendChild(btn);
}
</script>
{% endblock %}
