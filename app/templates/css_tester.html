{% extends "base.html" %}
{% block title %}CSS选择器测试器{% endblock %}
{% block content %}
<h2>CSS 选择器测试器</h2>
<div class="mb-3">
    <label>HTML 内容：</label>
    <textarea id="htmlContent" class="form-control" rows="8" placeholder="粘贴 HTML..."></textarea>
</div>
<div class="mb-3">
    <label>CSS 选择器：</label>
    <input type="text" id="cssSelector" class="form-control" placeholder="例如：div.content, .title, a[href]">
</div>
<button class="btn btn-primary" onclick="testCSS()">测试</button>
<div id="result" class="mt-3"></div>
<script>
function testCSS() {
    let html = document.getElementById('htmlContent').value;
    let selector = document.getElementById('cssSelector').value.trim();
    if (!html) { alert('请输入 HTML 内容'); return; }
    if (!selector) { alert('请输入 CSS 选择器'); return; }
    document.getElementById('result').innerHTML = '<div class="spinner-border"></div> 测试中...';
    fetch('/api/css-test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `html_content=${encodeURIComponent(html)}&css_selector=${encodeURIComponent(selector)}`
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            document.getElementById('result').innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
        } else {
            let resultsHtml = `<div class="alert alert-info">匹配到 ${data.count} 个元素${data.truncated ? '（仅显示前50个）' : ''}</div>`;
            if (data.results && data.results.length) {
                resultsHtml += '<ul class="list-group">';
                data.results.forEach((item, idx) => {
                    resultsHtml += `<li class="list-group-item"><pre class="mb-0" style="white-space: pre-wrap;">${escapeHtml(item)}</pre></li>`;
                });
                resultsHtml += '</ul>';
            } else {
                resultsHtml += '<div class="alert alert-warning">无匹配结果</div>';
            }
            document.getElementById('result').innerHTML = resultsHtml;
        }
    })
    .catch(() => document.getElementById('result').innerHTML = '<div class="alert alert-danger">请求失败</div>');
}
function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}
</script>
{% endblock %}
