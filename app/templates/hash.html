{% extends "base.html" %}
{% block title %}哈希计算器{% endblock %}
{% block content %}
<h2>哈希计算器</h2>
<form hx-post="/tool/hash" hx-target="#result" hx-swap="innerHTML">
    <div class="mb-3">
        <textarea name="text" class="form-control" rows="4" placeholder="输入要计算哈希的文本"></textarea>
    </div>
    <div class="mb-3">
        <select name="algo" class="form-select">
            <option value="md5">MD5</option>
            <option value="sha1">SHA-1</option>
            <option value="sha256">SHA-256</option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">计算哈希</button>
</form>
<div id="result" class="mt-3"></div>
{% endblock %}
