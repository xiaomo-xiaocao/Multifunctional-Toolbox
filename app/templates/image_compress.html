{% extends "base.html" %}
{% block title %}图片压缩工具{% endblock %}
{% block content %}
<h2>图片压缩工具</h2>
<form action="/image/compress" method="post" enctype="multipart/form-data" target="_blank">
    <div class="mb-3">
        <label>选择图片（最大 10MB）</label>
        <input type="file" class="form-control" name="file" accept="image/*" required>
    </div>
    <div class="mb-3">
        <label>压缩质量 (1-100)</label>
        <input type="number" class="form-control" name="quality" value="85" min="1" max="100">
    </div>
    <div class="mb-3">
        <label>最大宽度 (像素)</label>
        <input type="number" class="form-control" name="max_width" value="1920" min="100">
    </div>
    <button type="submit" class="btn btn-success">压缩并下载</button>
</form>
<div class="alert alert-info mt-3"><small>注意：压缩后格式为 JPEG，透明背景会变白。</small></div>
{% endblock %}
