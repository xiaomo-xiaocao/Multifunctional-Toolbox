{% extends "base.html" %}
{% block title %}JSON 格式化工具{% endblock %}
{% block content %}
<h2>JSON 格式化工具</h2>
<form hx-post="/text/json-format" hx-target="#result" hx-swap="innerHTML" hx-on::after-request="enableCopyButton()">
    <textarea class="form-control" name="raw_json" rows="8" placeholder='{"name":"张三","age":30}'></textarea>
    <button type="submit" class="btn btn-success mt-2">格式化</button>
</form>
<div id="result" class="mt-3"></div>
<script>
function enableCopyButton() {
    const resultDiv = document.getElementById('result');
    const pre = resultDiv.querySelector('pre');
    if (!pre) return;
    // 避免重复添加按钮
    if (resultDiv.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.textContent = '复制结果';
    btn.className = 'btn btn-sm btn-secondary mt-2 copy-btn';
    btn.onclick = () => {
        navigator.clipboard.writeText(pre.innerText);
        btn.textContent = '已复制！';
        setTimeout(() => btn.textContent = '复制结果', 2000);
    };
    resultDiv.appendChild(btn);
}
</script>
{% endblock %}
