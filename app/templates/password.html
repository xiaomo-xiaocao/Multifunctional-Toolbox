{% extends "base.html" %}
{% block title %}密码生成器{% endblock %}
{% block content %}
<h2>密码生成器</h2>
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <div class="mb-3">
                    <label>密码长度：</label>
                    <input type="number" id="length" class="form-control" value="12" min="4" max="64">
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" id="uppercase" class="form-check-input" checked>
                    <label class="form-check-label">大写字母 (A-Z)</label>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" id="lowercase" class="form-check-input" checked>
                    <label class="form-check-label">小写字母 (a-z)</label>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" id="digits" class="form-check-input" checked>
                    <label class="form-check-label">数字 (0-9)</label>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" id="symbols" class="form-check-input">
                    <label class="form-check-label">特殊符号 (!@#$%^&*)</label>
                </div>
                <button class="btn btn-primary" onclick="generatePassword()">生成密码</button>
                <hr>
                <div class="input-group">
                    <input type="text" id="password" class="form-control" readonly>
                    <button class="btn btn-outline-secondary" onclick="copyPassword()">复制</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
function generatePassword() {
    let length = parseInt(document.getElementById('length').value);
    let upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    let lower = 'abcdefghijklmnopqrstuvwxyz';
    let digits = '0123456789';
    let symbols = '!@#$%^&*()_+-=[]{};:?/<>,.';
    let chars = '';
    if (document.getElementById('uppercase').checked) chars += upper;
    if (document.getElementById('lowercase').checked) chars += lower;
    if (document.getElementById('digits').checked) chars += digits;
    if (document.getElementById('symbols').checked) chars += symbols;
    if (chars === '') {
        alert('请至少选择一种字符类型');
        return;
    }
    let password = '';
    for (let i = 0; i < length; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById('password').value = password;
}
function copyPassword() {
    let pwd = document.getElementById('password');
    pwd.select();
    document.execCommand('copy');
    alert('已复制到剪贴板');
}
</script>
{% endblock %}
