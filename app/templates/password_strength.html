{% extends "base.html" %}
{% block title %}密码强度检测{% endblock %}
{% block content %}
<h2>密码强度检测</h2>
<input type="password" id="password" class="form-control" placeholder="输入密码">
<div class="progress mt-2">
    <div id="strengthBar" class="progress-bar" role="progressbar" style="width: 0%;"></div>
</div>
<div id="strengthText" class="mt-2"></div>
<script>
const passwordInput = document.getElementById('password');
const strengthBar = document.getElementById('strengthBar');
const strengthText = document.getElementById('strengthText');

passwordInput.addEventListener('input', function() {
    let pwd = this.value;
    let score = 0;
    if (pwd.length >= 8) score++;
    if (pwd.length >= 12) score++;
    if (/[a-z]/.test(pwd)) score++;
    if (/[A-Z]/.test(pwd)) score++;
    if (/[0-9]/.test(pwd)) score++;
    if (/[^a-zA-Z0-9]/.test(pwd)) score++;
    let percent = Math.min(score * 15, 100);
    strengthBar.style.width = percent + '%';
    if (percent < 30) {
        strengthBar.className = 'progress-bar bg-danger';
        strengthText.innerHTML = '弱';
    } else if (percent < 70) {
        strengthBar.className = 'progress-bar bg-warning';
        strengthText.innerHTML = '中';
    } else {
        strengthBar.className = 'progress-bar bg-success';
        strengthText.innerHTML = '强';
    }
});
</script>
{% endblock %}
