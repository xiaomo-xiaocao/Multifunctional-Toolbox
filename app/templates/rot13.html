{% extends "base.html" %}
{% block title %}ROT13编解码{% endblock %}
{% block content %}
<h2>ROT13 编解码</h2>
<textarea id="input" class="form-control" rows="4" placeholder="输入文本..."></textarea>
<button class="btn btn-primary mt-2" onclick="rot13()">转换</button>
<div id="result" class="alert alert-info mt-3" style="display:none;"></div>
<script>
function rot13() {
    let str = document.getElementById('input').value;
    let result = str.replace(/[a-zA-Z]/g, function(c) {
        let base = c <= 'Z' ? 65 : 97;
        return String.fromCharCode((c.charCodeAt(0) - base + 13) % 26 + base);
    });
    document.getElementById('result').innerHTML = result;
    document.getElementById('result').style.display = 'block';
}
</script>
{% endblock %}
