{% extends "base.html" %}
{% block title %}UUID生成器{% endblock %}
{% block content %}
<h2>UUID生成器</h2>
<div class="mb-3">
    <label>生成数量 (1-20):</label>
    <input type="number" id="uuidCount" class="form-control" value="1" min="1" max="20">
</div>
<button class="btn btn-primary" onclick="generateUUIDs()">生成</button>
<div id="result" class="mt-3"></div>
<script>
function generateUUIDs() {
    let count = document.getElementById('uuidCount').value;
    fetch('/tool/uuid/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `count=${count}`
    })
    .then(res => res.text())
    .then(text => {
        document.getElementById('result').innerHTML = `<pre>${text}</pre>`;
    });
}
</script>
{% endblock %}
