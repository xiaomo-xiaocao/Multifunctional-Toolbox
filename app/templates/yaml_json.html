{% extends "base.html" %}
{% block title %}YAML↔JSON转换{% endblock %}
{% block content %}
<h2>YAML ↔ JSON 相互转换</h2>
<div class="row">
    <div class="col-md-6">
        <h5>YAML</h5>
        <textarea id="yamlText" class="form-control" rows="8" placeholder="输入YAML..."></textarea>
        <button class="btn btn-primary mt-2" onclick="yamlToJson()">YAML → JSON</button>
    </div>
    <div class="col-md-6">
        <h5>JSON</h5>
        <textarea id="jsonText" class="form-control" rows="8" placeholder="输入JSON..."></textarea>
        <button class="btn btn-primary mt-2" onclick="jsonToYaml()">JSON → YAML</button>
    </div>
</div>
<div id="result" class="mt-3"></div>
<script>
function yamlToJson() {
    let yaml = document.getElementById('yamlText').value;
    fetch('/api/yaml-to-json', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `yaml_text=${encodeURIComponent(yaml)}`
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) alert(data.error);
        else document.getElementById('jsonText').value = data.json;
    });
}
function jsonToYaml() {
    let json = document.getElementById('jsonText').value;
    fetch('/api/json-to-yaml', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `json_text=${encodeURIComponent(json)}`
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) alert(data.error);
        else document.getElementById('yamlText').value = data.yaml;
    });
}
</script>
{% endblock %}
